name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the v prefix"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --locked --group dev --extra scientific
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.version }}"
          } else {
            "${{ github.ref_name }}".TrimStart("v")
          }
          "value=$version" >> $env:GITHUB_OUTPUT
      - name: Build Windows portable ZIP
        shell: pwsh
        run: ./scripts/build_windows_release.ps1 -Version "${{ steps.version.outputs.value }}"
      - uses: actions/upload-artifact@v4
        with:
          name: SciDataFusion-${{ steps.version.outputs.value }}-windows-x64
          path: |
            dist/*.zip
            dist/*.sha256
      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.sha256
